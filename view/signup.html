<!doctype html>
<html lang="en" class="scroll-smooth scroll-pt-6">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to MisaTask</title>
    <link rel="stylesheet" href="/src/output.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="icon" type="image/x-icon" href="/asset/logo.png" />
  </head>
  <body class="font-poppins flex items-center justify-center h-screen w-screen">
    <aside class="flex justify-center items-center select-none relative w-full">
      <div class="group overflow-hidden">
        <img src="/asset/logo_stem.png" alt="logo" class="pin w-90 absolute" />
        <img
          src="/asset/logo_leaf.png"
          alt="logo"
          class="clock w-90 group-hover:rotate-180 duration-1000"
        />
      </div>
    </aside>
    <main
      class="flex flex-col justify-center bg-main text-white w-full h-full gap-6 px-8"
    >
      <h3 class="font-semibold text-4xl">Register Now</h3>
      <form action="" class="flex flex-col gap-4">
        <div class="flex w-full gap-6">
          <section class="flex flex-col gap-2 w-full">
            <label for="first" class="text-sm font-semibold">First Name</label>
            <input
              type="text"
              id="first"
              class="bg-white h-8 rounded-sm w-full px-2 text-sm text-black"
            />
          </section>
          <section class="flex flex-col gap-2 w-full">
            <label for="last" class="text-sm font-semibold">Last Name</label>
            <input
              type="text"
              id="last"
              class="bg-white h-8 rounded-sm w-full px-2 text-sm text-black"
            />
          </section>
        </div>

        <section class="flex flex-col gap-2 w-full">
          <label for="email" class="text-sm font-semibold">Email Address</label>
          <input
            type="email"
            id="email"
            class="bg-white h-8 rounded-sm w-full px-2 text-sm text-black"
          />
        </section>

        <section class="flex flex-col gap-2 w-full">
          <label for="pass" class="text-sm font-semibold">Password</label>
          <div
            class="relative flex items-center bg-whtie rounded-sm w-full bg-white"
          >
            <input
              type="password"
              id="pass"
              class="bg-white h-8 rounded-sm w-full px-2 text-sm text-black"
            />
            <button
              type="button"
              class="flex text-main-dark px-2 password-toggle cursor-pointer"
            >
              <div class="password-show">
                <i data-feather="eye"></i>
              </div>
              <div class="password-hide">
                <i data-feather="eye-off"></i>
              </div>
            </button>
          </div>
        </section>

        <section class="flex flex-col gap-2 w-full">
          <label for="cpass" class="text-sm font-semibold"
            >Confirm Password</label
          >
          <div
            class="relative flex items-center bg-whtie rounded-sm w-full bg-white"
          >
            <input
              type="password"
              id="cpass"
              class="bg-white h-8 rounded-sm w-full px-2 text-sm text-black"
            />
            <button
              type="button"
              class="flex text-main-dark px-2 password-toggle cursor-pointer"
            >
              <div class="password-show">
                <i data-feather="eye"></i>
              </div>
              <div class="password-hide">
                <i data-feather="eye-off"></i>
              </div>
            </button>
          </div>
        </section>

        <button
          type="button"
          onclick="auth()"
          class="flex justify-center items-center bg-main-dark h-8 text-sm font-medium rounded-sm cursor-pointer"
        >
          Sign Up
        </button>
      </form>
      <!-- <div class="relative flex items-center justify-center w-full">
        <hr class="border w-full" />
        <p class="absolute bg-main px-2 font-semibold">OR</p>
      </div>
      <div class="flex w-full gap-6">
        <a
          href=" /view/home.html"
          class="flex justify-center items-center bg-white text-black text-sm font-medium w-full px-4 h-8 rounded-sm"
          >Continue With Google</a
        >
        <a
          href=" /view/home.html"
          class="flex justify-center items-center bg-white text-black text-sm font-medium w-full px-4 h-8 rounded-sm"
          >Continue With Facebook</a
        >
      </div> -->
      <p class="text-sm text-center">
        Already have an account?
        <a href=" /view/login.html" class="font-semibold hover:underline"
          >Log in here</a
        >
      </p>
    </main>

    <script src="/js/form.js"></script>
    <script>
      feather.replace();
    </script>
  </body>
</html>
